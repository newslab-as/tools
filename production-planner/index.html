function setupStickyHeader() {
  const zone = document.getElementById('stickyZone');
  const syncHeight = () => { document.documentElement.style.setProperty('--sticky-h', `${zone.getBoundingClientRect().height}px`); };
  new ResizeObserver(syncHeight).observe(zone); let isCompact = zone.classList.contains('compact');
  const handleScroll = () => { const y = window.scrollY; if (!isCompact && y > 150) { isCompact = true; zone.classList.add('compact'); } else if (isCompact && y < 20) { isCompact = false; zone.classList.remove('compact'); } };
  if (window.__stickyScroll) window.removeEventListener('scroll', window.__stickyScroll); window.__stickyScroll = handleScroll; window.addEventListener('scroll', handleScroll, { passive: true });
}

function updateVisibleEventLabels() {
    const stickyZone = document.getElementById('stickyZone');
    if (!stickyZone) return;
    
    const stickyH = stickyZone.getBoundingClientRect().height;
    const weekdayH = document.querySelector('.weekday-row')?.getBoundingClientRect().height || 0;
    const threshold = stickyH + weekdayH;

    const grouped = {};
    document.querySelectorAll('body[data-view="vertical"] .event-bar').forEach(bar => {
        const id = bar.dataset.id;
        if (!grouped[id]) grouped[id] = [];
        grouped[id].push(bar);
    });

    Object.values(grouped).forEach(group => {
        if (group.length <= 1) return;
        
        group.forEach(bar => bar.classList.remove('force-label-visible'));
        
        for (let i = 0; i < group.length; i++) {
            if (group[i].getBoundingClientRect().bottom > threshold) {
                group[i].classList.add('force-label-visible');
                break;
            }
        }
    });
}

function escapeAttr(s) { return String(s||'').replace(/"/g, '&quot;'); } function escapeText(s) { return String(s||'').replace(/</g, '&lt;'); } function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function colorPickerHTML(currentColor) {
  const isCustom = typeof currentColor === 'string' && currentColor.startsWith('#'); const customHex = isCustom ? currentColor : '#bcbcbc';
  return `<div class="color-picker" data-current="${escapeAttr(currentColor || '')}">${PRESETS.map(c => { const cc = PRESET_HEX[c]; const selected = currentColor === c ? 'selected' : ''; return `<div class="color-swatch ${selected}" data-color="${c}" style="background:${cc.bg};border-color:${cc.edge}"></div>`; }).join('')}<div class="color-swatch custom-swatch ${isCustom ? 'selected' : 'empty'}" data-color="__custom__" style="${isCustom ? `background:${customHex};border-color:${darken(customHex, 0.22)}` : ''}">${isCustom ? '' : '<span class="custom-label">+</span>'}<input type="color" value="${customHex}" data-custom-input="1" aria-label="Custom color" /></div></div>`;
}
function wireColorPicker(container) {
  let selected = container.dataset.current || '';
  container.querySelectorAll('.color-swatch').forEach(sw => { sw.addEventListener('click', (e) => { const target = sw.dataset.color; if (target === '__custom__') { const input = sw.querySelector('input[type="color"]'); if (input) input.click(); return; } selected = target; container.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected')); sw.classList.add('selected'); }); });
  const customInput = container.querySelector('input[type="color"]');
  if (customInput) { customInput.addEventListener('input', (e) => { const hex = e.target.value; selected = hex; const swatch = customInput.parentElement; swatch.classList.remove('empty'); swatch.style.background = hex; swatch.style.borderColor = darken(hex, 0.22); const lbl = swatch.querySelector('.custom-label'); if (lbl) lbl.remove(); container.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected')); swatch.classList.add('selected'); }); }
  return () => selected;
}

function getViewCenterDateISO() {

            if (dayCells[dayIndex]) return dayCells[dayIndex].dataset.date;
        }
    } else if (state.viewMode === 'vertical' || state.viewMode === 'single_week') {
        const cells = document.querySelectorAll('.day-cell');
        let closest = null; let minDiff = Infinity;
        cells.forEach(c => {
            const rect = c.getBoundingClientRect();
            const diff = Math.abs(rect.top + rect.height / 2 - cy);
            if (diff < minDiff) { minDiff = diff; closest = c; }
        });
        if (closest) return closest.dataset.date;
    } else if (state.viewMode === 'overview') {
        const grid = document.getElementById('ovGrid');
        if (grid) {
            const rect = grid.getBoundingClientRect();
            const scrolledPct = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
            const totalDays = diffDays(state.start, state.end) + 1;
            const targetDays = Math.floor(scrolledPct * totalDays);
            return toISO(addDays(fromISO(state.start), targetDays));
        }
    }
    return null;
}

function switchView(newView) {
    if (state.viewMode === newView) return;
    const centerDate = getViewCenterDateISO();
    state.viewMode = newView;
    saveState(false);
    
    render(false);
    
    if (centerDate) {
        setTimeout(() => {
            const targetDay = fromISO(centerDate);
            if (state.viewMode === 'single_week') {
                state.currentWeekStart = toISO(startOfWeek(targetDay));
                render(false);
            } else if (state.viewMode === 'horizontal') {
                const newHzContainer = document.querySelector('.hz-layout');
                const targetCell = document.querySelector(`.hz-col[data-date="${centerDate}"]`) || document.querySelector(`.hz-day[data-date="${centerDate}"]`);
                if (newHzContainer && targetCell) {
                    const targetScroll = targetCell.offsetLeft - (newHzContainer.clientWidth / 2) + 28;
                    newHzContainer.scrollTo({ left: Math.max(0, targetScroll), behavior: 'auto' });
                    const stickyH = document.getElementById('stickyZone').getBoundingClientRect().height;
                    window.scrollTo({ top: newHzContainer.getBoundingClientRect().top + window.scrollY - stickyH - 20, behavior: 'auto' });
                }
            } else if (state.viewMode === 'vertical') {
                const targetCell = document.querySelector(`.day-cell[data-date="${centerDate}"]`);
                if (targetCell) {
                    const stickyH = document.getElementById('stickyZone').getBoundingClientRect().height; 
                    const weekdayH = document.querySelector('.weekday-row')?.getBoundingClientRect().height || 0; 
                    window.scrollTo({ top: targetCell.closest('.week-row').getBoundingClientRect().top + window.scrollY - stickyH - weekdayH - 20, behavior: 'auto' }); 
                }
            } else if (state.viewMode === 'overview') {
                 const grid = document.getElementById('ovGrid');
                 if (grid) {
                     const stickyH = document.getElementById('stickyZone').getBoundingClientRect().height;
                     window.scrollTo({ top: grid.getBoundingClientRect().top + window.scrollY - stickyH - 20, behavior: 'auto' });
                 }
            }
        }, 50);
    }
    hideViewTooltip();
}

document.getElementById('exportJsonBtn')?.addEventListener('click', (e) => {
  document.getElementById('settingsMenu').classList.remove('open'); state.lang = currentLang; const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state)); const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr); const safeTitle = (state.title || 'Project').replace(/[^a-z0-9]/gi, '_').toLowerCase(); const dateStr = toISO(new Date()); downloadAnchorNode.setAttribute("download", `newslab_plan_${safeTitle}_${dateStr}.json`); document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();

document.getElementById('exportCsvBtn')?.addEventListener('click', (e) => {
  document.getElementById('settingsMenu').classList.remove('open'); 
  const spanStart = state.start ? fromISO(state.start) : new Date(new Date().getFullYear(), new Date().getMonth(), 1); const spanEnd = state.end ? fromISO(state.end) : addDays(spanStart, 70); const gridStart = startOfWeek(spanStart); const gridEnd = addDays(startOfWeek(spanEnd), 6);
  let dates = []; let curr = gridStart;
  while (curr <= gridEnd) { if (state.showWeekends || !isWeekend(curr)) dates.push(new Date(curr)); curr = addDays(curr, 1); }
  let csv = ''; let row1 = ['"Event Name"', '"Start"', '"End"', '"Notes"']; let row2 = ['""', '""', '""', '""']; let currentWeek = -1;
  dates.forEach(d => { let wk = getISOWeek(d); if (wk !== currentWeek) { row1.push(`"WK ${wk}"`); currentWeek = wk; } else { row1.push('""'); } row2.push(`"${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}"`); });
  csv += row1.join(',') + '\n' + row2.join(',') + '\n';
  const events = [...state.events].sort((a, b) => new Date(a.start) - new Date(b.start) || new Date(b.end) - new Date(a.end));
  events.forEach(ev => {
    const safeTitle = (ev.name || '').replace(/"/g, '""'); const safeNotes = (ev.notes || '').replace(/"/g, '""').replace(/\n/g, ' '); let row = [`"${safeTitle}"`, `"${ev.start}"`, `"${ev.end}"`, `"${safeNotes}"`]; const evStart = fromISO(ev.start); const evEnd = fromISO(ev.end);
    dates.forEach(d => { if (d >= evStart && d <= evEnd) row.push('"■"'); else row.push('""'); }); csv += row.join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); const safeTitle = (state.title || 'Project').replace(/[^a-z0-9]/gi, '_').toLowerCase(); link.setAttribute('download', `newslab_plan_${safeTitle}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link);
});

document.getElementById('importJsonInput')?.addEventListener('change', (event) => {
  document.getElementById('settingsMenu').classList.remove('open'); const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try { const importedState = JSON.parse(e.target.result); if (importedState && importedState.events) { state = migrateData(importedState); if (state.lang) setLanguage(state.lang); saveState(); render(); customAlert('Plan loaded successfully!', 'Success'); } else { customAlert('Invalid file format. Ensure it is a valid plan file.', 'Error'); } } catch (err) { customAlert('Error parsing the file.', 'Error'); }
    event.target.value = '';
  };
  reader.readAsText(file);
});

document.getElementById('importUrlBtn')?.addEventListener('click', () => {
  document.getElementById('settingsMenu').classList.remove('open');
  customPrompt(t('import_url_prompt'), '', (url) => {
    if (!url) return;
    try {
      const hashIndex = url.indexOf('#plan=');
      if (hashIndex === -1) throw new Error('No plan data found in URL');
      
      let encoded = url.substring(hashIndex + 6);
      const ampIndex = encoded.indexOf('&');
      if (ampIndex !== -1) encoded = encoded.substring(0, ampIndex);
      
      const json = decodeURIComponent(escape(atob(encoded)));
      const importedState = JSON.parse(json);
      
      if (importedState && importedState.events) {
         state = migrateData(importedState);
         
         // Remove read-only locks so the imported version is editable
         window.__isReadOnly = false;
         document.body.classList.remove('read-only');
         document.querySelectorAll('#projectTitle, #projectDesc, #projectStart, #projectEnd').forEach(el => el.disabled = false);
         
         // Disconnect from any active Drive file
         currentDriveFileId = null;
         localStorage.removeItem('newslab-current-drive-file');
         updateCloudStatus('Disconnected');
         
         if (state.lang) setLanguage(state.lang);
         saveState();
         render(false);
         customAlert('Plan loaded successfully!', 'Success');
         
         // Strip the hash from the browser URL to avoid refreshing back to the old state
         history.replaceState(null, null, window.location.pathname);
      } else {
         throw new Error('Invalid format');
      }
    } catch(err) {
      customAlert(t('import_error'), 'Error');
    }
  });
});

if (window.__isReadOnly) document.querySelectorAll('#projectTitle, #projectDesc, #projectStart, #projectEnd').forEach(el => el.disabled = true);
applyStaticTranslations(); updateLangToggle(); document.documentElement.lang = currentLang === 'nb' ? 'no' : 'en'; 

let initialLoad = true;
render();
if (initialLoad) {
    setTimeout(() => document.getElementById('todayBtn')?.click(), 300);
    initialLoad = false;
}
</script>
<script>
// ============================================================================
// NEWSLAB PRODUCTION PLANNER — DRIVE-BACKED SHARE MODULE
// Self-contained IIFE. Overrides the old base64 "Copy Client Link" behaviour
// and adds the public read-only /share/ viewer + revoke logic. Runs after the
// main planner script and reuses its globals (state, render, migrateData, ...).
// ============================================================================
(function () {
  'use strict';

  // ---- 1. Detect share-viewer mode --------------------------------------
  // A share link looks like:  .../production-planner/share/#<driveFileId>
  // We also accept the explicit #file=<id> form for robustness.
  function detectShareFileId() {
    const hash = window.location.hash || '';
    const path = window.location.pathname || '';
    if (hash.indexOf('#file=') === 0) {
      return decodeURIComponent(hash.substring(6).split('&')[0]);
    }
    if (path.indexOf('/share') !== -1) {
      const raw = hash.replace(/^#/, '').split('&')[0];
      if (raw && raw.indexOf('plan=') !== 0) return decodeURIComponent(raw);
    }
    return null;
  }

  const shareFileId = detectShareFileId();
  const isShareMode = !!shareFileId;
  window.__isShareMode = isShareMode;

  // In share mode: lock to read-only and suppress all Google sign-in.
  if (isShareMode) {
    window.__isReadOnly = true;
    document.body.classList.add('read-only');

    // Neutralise the editor's window.onload (OAuth / silent login) so a
    // public visitor is never prompted to sign in.
    const _origOnload = window.onload;
    window.onload = function () {
      if (window.__isShareMode) return;
      if (typeof _origOnload === 'function') return _origOnload.apply(this, arguments);
    };
  }

  // ---- 2. A confirm dialog (reuses the existing #dialogModal) -------------
  function shareConfirm(message, onConfirm, title, okLabel) {
    const ok = document.getElementById('dialogOk');
    document.getElementById('dialogTitle').textContent = title || 'NewsLab';
    document.getElementById('dialogMessage').textContent = message;
    document.getElementById('dialogInput').style.display = 'none';
    document.getElementById('dialogCancel').style.display = 'inline-flex';
    ok.textContent = okLabel || 'OK';
    document.getElementById('dialogModal').classList.add('open');
    // dialogCallback is the shared global used by the existing OK/Cancel wiring.
    dialogCallback = function (v) {
      document.getElementById('dialogOk').textContent = 'OK';
      if (v === true && typeof onConfirm === 'function') onConfirm();
    };
  }

  // ---- 3. Drive permission helpers (editor side, requires OAuth token) ----
  function setFilePublic(fileId) {
    return gapi.client.drive.permissions.create({
      fileId: fileId,
      supportsAllDrives: true,
      resource: { role: 'reader', type: 'anyone' }
    });
  }
  async function revokeFilePublic(fileId) {
    const list = await gapi.client.drive.permissions.list({
      fileId: fileId, supportsAllDrives: true, fields: 'permissions(id,type,role)'
    });
    const perms = (list.result.permissions || []).filter(function (p) { return p.type === 'anyone'; });
    for (const p of perms) {
      await gapi.client.drive.permissions.delete({
        fileId: fileId, permissionId: p.id, supportsAllDrives: true
      });
    }
  }
  async function isFilePublic(fileId) {
    try {
      const list = await gapi.client.drive.permissions.list({
        fileId: fileId, supportsAllDrives: true, fields: 'permissions(id,type,role)'
      });
      return (list.result.permissions || []).some(function (p) { return p.type === 'anyone'; });
    } catch (e) { return false; }
  }

  // ---- 4. Build the public /share/ URL ------------------------------------
  function buildShareUrl(fileId) {
    let base = window.location.href.split('#')[0].split('?')[0];
    let shareBase;
    if (base.indexOf('/share/') !== -1) {
      shareBase = base.substring(0, base.indexOf('/share/') + 7);
    } else if (/\/index\.html?$/i.test(base)) {
      shareBase = base.replace(/\/index\.html?$/i, '/share/');
    } else if (base.charAt(base.length - 1) === '/') {
      shareBase = base + 'share/';
    } else {
      shareBase = base + '/share/';
    }
    return shareBase + '#' + fileId;
  }

  // ---- 5. Anonymous read for the public viewer ----------------------------
  function shareLoadingMessage() {
    const cal = document.getElementById('calendar');
    if (cal) cal.innerHTML =
      '<div style="padding:80px 40px;text-align:center;font-family:\'JetBrains Mono\',monospace;' +
      'color:var(--ink-faint);font-size:13px;letter-spacing:0.08em;">LOADING PLAN…</div>';
  }
  function showShareError() {
    const cal = document.getElementById('calendar');
    if (cal) cal.innerHTML =
      '<div style="padding:80px 40px;text-align:center;font-family:\'JetBrains Mono\',monospace;color:var(--ink-soft);">' +
      '<div style="font-size:15px;letter-spacing:0.04em;margin-bottom:10px;">LINK UNAVAILABLE</div>' +
      '<div style="font-size:13px;color:var(--ink-faint);line-height:1.6;">This shared plan is no longer available.<br>' +
      'The link may have been revoked, or the plan removed.</div></div>';
    const ti = document.getElementById('projectTitle'); if (ti) ti.value = '';
    const de = document.getElementById('projectDesc'); if (de) de.value = '';
    document.getElementById('monthLabel').textContent = '—';
    document.getElementById('weekRange').textContent = '';
  }
  async function loadSharedPlan(fileId) {
    try {
      shareLoadingMessage();
      const url = 'https://www.googleapis.com/drive/v3/files/' +
        encodeURIComponent(fileId) + '?alt=media&key=' + GOOGLE_API_KEY + '&supportsAllDrives=true';
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!data || !data.events) throw new Error('Invalid plan');
      state = migrateData(data);
      if (state.lang && typeof setLanguage === 'function') { setLanguage(state.lang); }
      render();
      setTimeout(function () {
        const btn = document.getElementById('todayBtn');
        if (btn) btn.click();
      }, 300);
    } catch (e) {
      showShareError();
    }
  }

  // ---- 6. "Copy Client Link" — Drive-backed live share --------------------
  function wireCreateShareLink() {
    const old = document.getElementById('topCopyLinkBtn');
    if (!old) return;
    // Clone to strip the original base64 click listener, then rewire.
    const btn = old.cloneNode(true);
    old.parentNode.replaceChild(btn, old);

    btn.addEventListener('click', async function () {
      if (typeof gapi === 'undefined' || !gapi.client || !gapi.client.getToken()) {
        return customAlert('Sign in with Google first to create a client link.', 'Sign in required');
      }
      if (!currentDriveFileId) {
        return customAlert('Save this plan to a Drive file first (Settings → "Save as New File"), then create the client link.', 'Save to Drive first');
      }
      const fileId = currentDriveFileId;
      const name = state.title || 'this plan';
      const already = await isFilePublic(fileId);

      const doShare = function () {
        (async function () {
          try {
            updateCloudStatus('Sharing...');
            state.lang = currentLang;
            // Push the latest edits so the link opens the current version.
            await fetch('https://www.googleapis.com/upload/drive/v3/files/' + fileId +
              '?uploadType=media&supportsAllDrives=true', {
              method: 'PATCH',
              headers: new Headers({
                'Authorization': 'Bearer ' + gapi.client.getToken().access_token,
                'Content-Type': 'application/json'
              }),
              body: JSON.stringify(state)
            });
            if (!already) await setFilePublic(fileId);
            const shareUrl = buildShareUrl(fileId);
            updateCloudStatus('Saved');
            if (navigator.clipboard && window.isSecureContext) {
              try {
                await navigator.clipboard.writeText(shareUrl);
                customAlert(t('link_copied') + '\n\n' + shareUrl, 'Client link ready');
              } catch (e) {
                customPrompt('Copy this client link:', shareUrl, function () {});
              }
            } else {
              customPrompt('Copy this client link:', shareUrl, function () {});
            }
          } catch (err) {
            updateCloudStatus('Error');
            customAlert('Could not create the client link. Check your connection and try again.', 'Error');
          }
        })();
      };

      if (already) {
        doShare();
      } else {
        shareConfirm(
          '“' + name + '” will become viewable by anyone with the link — no sign-in needed. ' +
          'The link always shows your latest saved version, and you can revoke it anytime from Settings.',
          doShare, 'Create client link?', 'Create link'
        );
      }
    });
  }

  // ---- 7. "Revoke Client Link" — new Settings item ------------------------
  function wireRevokeItem() {
    const anchor = document.getElementById('shareLinkBtn');
    if (!anchor || document.getElementById('revokeShareBtn')) return;
    const item = document.createElement('button');
    item.className = 'settings-menu-item';
    item.id = 'revokeShareBtn';
    item.textContent = 'Revoke Client Link';
    anchor.parentNode.insertBefore(item, anchor.nextSibling);

    item.addEventListener('click', function () {
      document.getElementById('settingsMenu').classList.remove('open');
      if (typeof gapi === 'undefined' || !gapi.client || !gapi.client.getToken()) {
        return customAlert('Sign in with Google first.', 'Sign in required');
      }
      if (!currentDriveFileId) {
        return customAlert('No Drive-backed plan is loaded.', 'Nothing to revoke');
      }
      shareConfirm(
        'Revoke public access to this plan? Anyone currently holding a client link will immediately lose access.',
        function () {
          (async function () {
            try {
              updateCloudStatus('Working...');
              await revokeFilePublic(currentDriveFileId);
              updateCloudStatus('Saved');
              customAlert('Public access revoked. Existing client links no longer work.', 'Revoked');
            } catch (e) {
              updateCloudStatus('Error');
              customAlert('Could not revoke access. Try again.', 'Error');
            }
          })();
        }, 'Revoke client link?', 'Revoke'
      );
    });
  }

  // ---- 8. Boot ------------------------------------------------------------
  if (isShareMode) {
    // Public viewer: fetch the plan anonymously and render it read-only.
    loadSharedPlan(shareFileId);
  } else {
    // Editor: swap in the Drive-backed share behaviour.
    wireCreateShareLink();
    wireRevokeItem();
  }
})();
</script>
